# The port this API Gateway app listens on.
# All external traffic comes in here first.
server:
  port: 4004

# Auth service base URL used by JwtValidationGatewayFilterFactory.
# Can be overridden by AUTH_SERVICE_URL env var.
auth-service:
  url: ${AUTH_SERVICE_URL:http://auth-service:4005}

spring:
  cloud:
    gateway:
      routes:
       ## http://localhost:4004/auth/login  ->  http://auth-service:4005/login
       ### API GATEWAY -> http://auth-service:4005/login
        - id: auth-service-route
          uri: http://auth-service:4005
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1

        # -------------------------------------------------------
        # ROUTE 1: Forward patient API calls to patient-service
        # -------------------------------------------------------
        - id: patient-service-route

          # Where to forward the request.
          # 'patient-service' is the Docker service name (internal DNS).
          uri: http://patient-service:4000

          # Condition: only requests matching this path hit this route.
          predicates:
            - Path=/api/patients/**

          # StripPrefix=1 removes the first path segment before forwarding.
          # /api/patients/123  ->  /patients/123
          filters:
            - StripPrefix=1
            - JwtValidation

          # Request flow:
          #   Client calls  : http://localhost:4004/api/patients
          #   Gateway sends : http://patient-service:4000/patients

        # -------------------------------------------------------
        # ROUTE 2: Expose patient-service Swagger docs via gateway
        # -------------------------------------------------------
        - id: api-docs-patient-route

          uri: http://patient-service:4000

          # Condition: only the exact path /api-docs/patients matches.
          predicates:
            - Path=/api-docs/patients

          # RewritePath completely replaces the path before forwarding.
          # /api-docs/patients  ->  /v3/api-docs
          filters:
            - RewritePath=/api-docs/patients, /v3/api-docs

          # Request flow:
          #   Client calls  : http://localhost:4004/api-docs/patients
          #   Gateway sends : http://patient-service:4000/v3/api-
          
        - id: api-docs-auth-route
          uri: http://auth-service:4005
          predicates:
            - Path=/api-docs/auth
          filters:
            - RewritePath=/api-docs/auth, /v3/api-docs